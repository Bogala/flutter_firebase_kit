# Agent OS Standards Index

global:
  commit-format:
    description: JIRA ticket prefix, type/scope convention, French summary — always required

flutter:
  anti-corruption-layer:
    description: DTO/Entity separation and conversion pattern
  bloc-feature-structure:
    description: BLoC feature directory layout, page/view split, interactor ACL, stream vs future
  code-generation:
    description: Generated file types, build_runner commands, flavorizr caveats
  flavors:
    description: 6 flavors with purposes, protected flavors, entry point pattern, F.name DI link
  dependency-injection:
    description: Flavor-scoped singletons, @Order(-1) for infrastructure, boot sequence
  layer-imports:
    description: Strict unidirectional layer import rules
  module-exports:
    description: "*_module.dart public API rule — every folder exposes one, import only via it"
  routing:
    description: Feature self-registration via addRoute(), transitionGoRoute() wrapper, ShellRoute shell
  testing:
    description: Gherkin step naming, test bootstrap sequence, test view settings
