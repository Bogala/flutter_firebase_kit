name: flutter_starter_kit
description: "Application BDD directement accessible."
publish_to: 'none'
version: 1.0.1

environment:
  sdk: ^3.10.2
dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  get_it: ^9.2.1
  injectable: ^2.7.1+4
  flutter_bloc: ^9.1.1
  dio: ^5.9.2
  retrofit: ^4.9.2
  json_annotation: ^4.11.0
  flavor: ^2.0.0
  intl: ^0.20.2
  dio_mocked_responses: ^1.6.5+1
  flutter_svg: ^2.2.4
  characters: ^1.4.1
  dio_cache_interceptor: ^4.0.5
  hive: ^2.2.3
  freezed_annotation: ^3.1.0
  transparent_image: ^2.0.1
  go_router: ^17.1.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.12.2
